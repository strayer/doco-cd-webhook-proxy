changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Dependencies
      labels:
        - dependencies
    - title: Miscellaneous
      labels:
        - "*"
      exclude_labels:
        - breaking
        - feature
        - enhancement
        - bug
        - dependencies
