repos:
  - repo: local
    hooks:
      - id: goimports
        name: goimports
        entry: goimports -w
        language: system
        types: [go]
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev=HEAD
        language: system
        types: [go]
        pass_filenames: false
